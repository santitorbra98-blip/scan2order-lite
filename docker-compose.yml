services:
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "${APP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./backend:/var/www/html
      - frontend_dist:/var/www/frontend
      - ./backend/storage/app/public:/var/www/html/public/storage
    depends_on:
      - php
      - frontend
    restart: unless-stopped
    networks:
      - scan2order

  php:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-scan2order_lite}
      - DB_USERNAME=${DB_USERNAME:-scan2order}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - CACHE_STORE=${CACHE_STORE:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-sync}
    restart: unless-stopped
    networks:
      - scan2order

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-scan2order_lite}
      POSTGRES_USER: ${DB_USERNAME:-scan2order}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    restart: unless-stopped
    networks:
      - scan2order

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/app/dist
    networks:
      - scan2order

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    restart: unless-stopped
    networks:
      - scan2order

  scheduler:
    build:
      context: ./docker/php
    command: sh -c "while true; do php artisan schedule:run --no-ansi >> /dev/null 2>&1; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-scan2order_lite}
      - DB_USERNAME=${DB_USERNAME:-scan2order}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - CACHE_STORE=${CACHE_STORE:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-sync}
    restart: unless-stopped
    networks:
      - scan2order

volumes:
  postgres_data:
  frontend_dist:

networks:
  scan2order:
    driver: bridge
